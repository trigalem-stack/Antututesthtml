<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extreme Web Benchmark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/1.0.35/ua-parser.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0d0d0d;
            color: #ffffff;
            margin: 0;
            padding-top: 30px;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        body.ios-fullscreen {
            position: fixed !important;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            padding-top: env(safe-area-inset-top);
            background-color: #050505;
            overflow-y: auto;
        }

        #score-container { margin-bottom: 20px; position: relative; z-index: 10; }
        #score {
            font-size: 72px; font-weight: bold; color: #ff3b30;
            text-shadow: 0 0 20px rgba(255, 59, 48, 0.8);
            transition: color 0.3s;
        }
        #details { font-size: 15px; color: #aaa; margin-bottom: 10px; min-height: 50px; line-height: 1.5; }
        
        #hw-info {
            font-size: 13px; color: #00c6ff; background: rgba(0, 198, 255, 0.1);
            padding: 10px; border-radius: 8px; display: inline-block;
            margin-bottom: 20px; border: 1px solid rgba(0, 198, 255, 0.3);
            line-height: 1.6; max-width: 90%; text-align: left;
        }

        #progress-container {
            width: 85%; max-width: 450px; height: 16px; background: #222;
            border-radius: 8px; margin: 0 auto 20px auto; overflow: hidden;
            display: none; position: relative; z-index: 10;
        }
        #progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072ff, #ff0080, #ff8c00);
            transition: width 0.1s linear;
        }
        #progress-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        button {
            padding: 16px 45px; font-size: 18px; font-weight: bold; cursor: pointer;
            background: linear-gradient(45deg, #ff8c00, #ff0080); color: #ffffff; 
            border: none; border-radius: 30px; transition: 0.3s; position: relative; z-index: 10;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(255, 0, 128, 0.5); }
        button:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #status { margin-top: 20px; font-size: 16px; font-weight: bold; color: #00c6ff; }
        #canvas-container {
            width: 100%; height: 450px; margin-top: 20px;
            background-color: #000; display: none; position: relative;
        }
        #fps-counter {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 10px;
            border-radius: 5px; font-family: monospace; font-size: 14px; z-index: 20;
        }
        #phys-canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div id="score-container">
        <div id="score">?</div>
        <div id="details">Нажми кнопку, чтобы начать экстремальный стресс-тест железа</div>
        <div id="hw-info">Определение устройства...</div>
    </div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">0%</div>
    </div>
    
    <button id="test-btn" onclick="startBenchmark()">Запуск (1 Минута)</button>
    <div id="status">Ожидание...</div>

    <div id="canvas-container"></div>

    <script>
        const scoreElement = document.getElementById('score');
        const detailsElement = document.getElementById('details');
        const hwInfoElement = document.getElementById('hw-info');
        const btn = document.getElementById('test-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const statusElement = document.getElementById('status');
        const canvasContainer = document.getElementById('canvas-container');

        const STAGES = 4;
        const STAGE_DURATION = 15000;
        window.benchmarkAccumulator = 0;

        function updateGlobalProgress(stageIndex, elapsed) {
            let currentStageProgress = Math.min(elapsed / STAGE_DURATION, 1);
            let totalPercent = ((stageIndex + currentStageProgress) / STAGES) * 100;
            progressBar.style.width = totalPercent + '%';
            progressText.innerText = Math.floor(totalPercent) + '%';
        }

        function guessCpuFromGpu(gpuString) {
            if (!gpuString) return "Неизвестный CPU";
            const g = gpuString.toLowerCase();
            
            if (g.includes('apple m3')) return 'Apple M3 (Silicon)';
            if (g.includes('apple m2')) return 'Apple M2 (Silicon)';
            if (g.includes('apple m1')) return 'Apple M1 (Silicon)';
            if (g.includes('apple a17')) return 'Apple A17 Pro';
            if (g.includes('apple a16')) return 'Apple A16 Bionic';
            if (g.includes('apple a15')) return 'Apple A15 Bionic';
            if (g.includes('apple a14')) return 'Apple A14 Bionic';
            if (g.includes('apple')) return 'Apple A-Series / M-Series';
            
            if (g.includes('adreno (tm) 750') || g.includes('adreno 750')) return 'Snapdragon 8 Gen 3';
            if (g.includes('adreno (tm) 740') || g.includes('adreno 740')) return 'Snapdragon 8 Gen 2';
            if (g.includes('adreno (tm) 732') || g.includes('adreno 732')) return 'Snapdragon 7s Gen 2';
            if (g.includes('adreno (tm) 730') || g.includes('adreno 730')) return 'Snapdragon 8 Gen 1 / 7+ Gen 2';
            if (g.includes('adreno (tm) 725') || g.includes('adreno 725')) return 'Snapdragon 7+ Gen 2';
            if (g.includes('adreno (tm) 710') || g.includes('adreno 710')) return 'Snapdragon 8s Gen 3 / 7 Gen 1';
            
            if (g.includes('adreno (tm) 660') || g.includes('adreno 660')) return 'Snapdragon 888';
            if (g.includes('adreno (tm) 650') || g.includes('adreno 650')) return 'Snapdragon 865 / 870';
            if (g.includes('adreno (tm) 644') || g.includes('adreno 644')) return 'Snapdragon 778G / 780G';
            if (g.includes('adreno (tm) 642') || g.includes('adreno 642')) return 'Snapdragon 778G';
            if (g.includes('adreno (tm) 640') || g.includes('adreno 640')) return 'Snapdragon 855';
            if (g.includes('adreno (tm) 630') || g.includes('adreno 630')) return 'Snapdragon 845';
            if (g.includes('adreno (tm) 620') || g.includes('adreno 620')) return 'Snapdragon 765G';
            if (g.includes('adreno (tm) 619') || g.includes('adreno 619')) return 'Snapdragon 750G / 695';
            if (g.includes('adreno (tm) 618') || g.includes('adreno 618')) return 'Snapdragon 730G / 732G';
            if (g.includes('adreno (tm) 616') || g.includes('adreno 616')) return 'Snapdragon 712';
            if (g.includes('adreno (tm) 612') || g.includes('adreno 612')) return 'Snapdragon 675 / 678';
            if (g.includes('adreno (tm) 610') || g.includes('adreno 610')) return 'Snapdragon 680 / 685 / 665';
            
            if (g.includes('adreno (tm) 540') || g.includes('adreno 540')) return 'Snapdragon 835';
            if (g.includes('adreno (tm) 530') || g.includes('adreno 530')) return 'Snapdragon 820 / 821';
            if (g.includes('adreno (tm) 512') || g.includes('adreno 512')) return 'Snapdragon 660';
            if (g.includes('adreno (tm) 509') || g.includes('adreno 509')) return 'Snapdragon 636';
            if (g.includes('adreno (tm) 506') || g.includes('adreno 506')) return 'Snapdragon 625 / 626 / 450';
            if (g.includes('adreno (tm) 505') || g.includes('adreno 505')) return 'Snapdragon 430 / 435';
            if (g.includes('adreno (tm) 504') || g.includes('adreno 504')) return 'Snapdragon 429';
            if (g.includes('adreno')) return 'Qualcomm Snapdragon (Устаревшая модель)';

            if (g.includes('mali-g925')) return 'Dimensity 9400 / 9300';
            if (g.includes('mali-g720')) return 'Dimensity 9300';
            if (g.includes('mali-g715')) return 'Dimensity 9200';
            if (g.includes('mali-g710')) return 'Dimensity 9000 / Tensor G2';
            if (g.includes('mali-g78')) return 'Exynos 2100 / Tensor G1';
            if (g.includes('xclipse 940')) return 'Exynos 2400';
            if (g.includes('xclipse 920')) return 'Exynos 2200';
            if (g.includes('mali')) return 'MediaTek Dimensity / Exynos (Mali)';
            
            if (g.includes('rtx') || g.includes('gtx')) return 'PC CPU (Intel/AMD) + NVIDIA GPU';
            if (g.includes('radeon') || g.includes('amd')) return 'AMD Ryzen processor';
            if (g.includes('intel')) return 'Intel Core processor';

            return "CPU не распознан";
        }

        async function detectHardware() {
            let device = "Неизвестное устройство";
            let browserInfo = "";
            
            try {
                const parser = new UAParser();
                const result = parser.getResult();
                
                if (result.device.vendor && result.device.model) {
                    device = `${result.device.vendor} ${result.device.model}`;
                } else if (result.os.name) {
                    device = `${result.os.name} Device`;
                }
                browserInfo = `${result.browser.name} ${result.browser.major}`;
            } catch(e) {}

            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    const ua = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    if (ua.model) device = `${ua.platform} ${ua.model}`;
                } catch(e) {}
            }

            const cores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency : "Неизвестно";
            
            let gpu = "Не определен";
            let cpu = "Неизвестно";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        cpu = guessCpuFromGpu(gpu);
                    }
                }
            } catch(e) {}

            hwInfoElement.innerHTML = `
                <b>📱 Устройство:</b> ${device} <br>
                <b>🧠 CPU (Оценка):</b> ${cpu} (${cores} потоков) <br>
                <b>🎮 GPU:</b> ${gpu} <br>
                <b>🌐 Браузер:</b> ${browserInfo}
            `;
        }
        
        detectHardware();

        function requestFullScreenMode() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen().catch(()=>{}); }
            else if (docEl.webkitRequestFullscreen) { docEl.webkitRequestFullscreen().catch(()=>{}); }
            document.body.classList.add('ios-fullscreen');
            window.scrollTo(0, 1);
        }

        function exitFullScreenMode() {
            if (document.exitFullscreen && document.fullscreenElement) { document.exitFullscreen().catch(()=>{}); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            document.body.classList.remove('ios-fullscreen');
        }

        async function startBenchmark() {
            requestFullScreenMode();
            
            btn.disabled = true;
            scoreElement.style.fontSize = '48px';
            scoreElement.style.color = '#00c6ff';
            scoreElement.innerText = 'Анализ...';
            detailsElement.innerText = 'Внимание: Устройство может сильно нагреться.\nНе сворачивайте браузер.';
            
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressText.innerText = '0%';
            
            canvasContainer.style.display = 'none';
            canvasContainer.innerHTML = '';

            let totalScore = 0;
            window.benchmarkAccumulator = 0;

            try {
                statusElement.innerText = 'Этап 1/4: Тяжелая FPU Математика (CPU)...';
                const cpuScore = await runCPUTest();
                totalScore += cpuScore;

                statusElement.innerText = 'Этап 2/4: Экстремальная шина и кэш (RAM)...';
                const memScore = await runMEMTest();
                totalScore += memScore;

                statusElement.innerText = 'Этап 3/4: Симуляция частиц (Тяжелая физика)...';
                const physScore = await runPhysicsTest();
                totalScore += physScore;

                statusElement.innerText = 'Этап 4/4: Физический рендер и динамические тени (GPU)...';
                const gpuScore = await runGPUTest();
                totalScore += gpuScore;

                progressBar.style.width = '100%';
                progressText.innerText = '100%';
                scoreElement.style.fontSize = '72px';
                scoreElement.style.color = '#ff3b30';
                
                // Убрано вычисление UX/Система 
                const finalScore = Math.floor(totalScore);
                
                scoreElement.innerText = finalScore.toLocaleString('ru-RU');
                
                // Убрана строка с выводом UX/Система 
                detailsElement.innerHTML = `
                    CPU: <b>${Math.floor(cpuScore).toLocaleString('ru-RU')}</b> | 
                    RAM: <b>${Math.floor(memScore).toLocaleString('ru-RU')}</b> <br>
                    PHY: <b>${Math.floor(physScore).toLocaleString('ru-RU')}</b> | 
                    GPU: <b>${Math.floor(gpuScore).toLocaleString('ru-RU')}</b>
                `;
                
                statusElement.innerText = 'Тестирование завершено!';
                
            } catch (e) {
                statusElement.innerText = 'Ошибка при тестировании!';
                console.error(e);
            }

            btn.innerText = 'Повторить тест';
            btn.disabled = false;
            setTimeout(() => { 
                progressContainer.style.display = 'none'; 
                exitFullScreenMode();
            }, 6000);
        }

        // --- ЭТАП 1: ТЕСТ CPU ---
        function runCPUTest() {
            return new Promise((resolve) => {
                let ops = 0;
                let startTime = performance.now();
                const MAT_SIZE = 150; 
                
                let matA = new Float64Array(MAT_SIZE * MAT_SIZE);
                let matB = new Float64Array(MAT_SIZE * MAT_SIZE);
                let matC = new Float64Array(MAT_SIZE * MAT_SIZE);
                
                for(let i=0; i<matA.length; i++) {
                    matA[i] = Math.random();
                    matB[i] = Math.random();
                }

                function computeBatch() {
                    let batchStart = performance.now();
                    while (performance.now() - batchStart < 16) {
                        let localSum = 0;
                        for (let i = 0; i < MAT_SIZE; i++) {
                            for (let j = 0; j < MAT_SIZE; j++) {
                                let sum = 0;
                                for (let k = 0; k < MAT_SIZE; k++) {
                                    sum += (matA[i * MAT_SIZE + k] * Math.sin(matB[k * MAT_SIZE + j])) / (Math.sqrt(k + 1.1) + Math.cos(i));
                                }
                                matC[i * MAT_SIZE + j] = sum;
                                localSum += sum;
                            }
                        }
                        window.benchmarkAccumulator += localSum;
                        ops++;
                    }

                    let elapsed = performance.now() - startTime;
                    updateGlobalProgress(0, elapsed);

                    if (elapsed < STAGE_DURATION) {
                        requestAnimationFrame(computeBatch);
                    } else {
                        resolve((ops / (elapsed / 1000)) * 22000);
                    }
                }
                requestAnimationFrame(computeBatch);
            });
        }

        // --- ЭТАП 2: ЭКСТРЕМАЛЬНЫЙ ТЕСТ ПАМЯТИ (Bandwidth & Latency & MLP) ---
        function runMEMTest() {
            return new Promise((resolve) => {
                let ops = 0;
                let startTime = performance.now();
                
                // Выделение 1 ГБ (268 435 456 элементов) с фоллбэком на 512 МБ
                const TARGET_MEM_SIZE = 268435456; 
                let memory;
                try {
                    memory = new Uint32Array(TARGET_MEM_SIZE);
                } catch (e) {
                    // Если браузер или устройство не потянет 1ГБ в одной вкладке, снижаем
                    memory = new Uint32Array(134217728); 
                }
                const actualSize = memory.length;

                // Заполнение для хаотичных Cache Misses
                const PRIME_STRIDE = 15485863;
                let lastIdx = 0;
                
                for (let i = 0; i < actualSize; i++) {
                    // Используем побитовое 'И' для быстрого кольцевого буфера
                    let nextIdx = (lastIdx + PRIME_STRIDE) & (actualSize - 1); 
                    memory[lastIdx] = nextIdx;
                    lastIdx = nextIdx;
                }

                // 4 указателя для параллелизма уровня памяти (Memory Level Parallelism)
                let idx1 = 0;
                let idx2 = actualSize >> 1;
                let idx3 = actualSize >> 2;
                let idx4 = actualSize >> 3;

                // Дополнительный буфер на 8 МБ для жесткого трэшинга L3-кэша и пропускной способности (Bandwidth)
                const bwBuffer = new Float64Array(1024 * 1024); 

                function memBatch() {
                    let batchStart = performance.now();
                    
                    while (performance.now() - batchStart < 16) {
                        // 1. Удар по задержкам памяти (Cache Latency & MLP limit)
                        for(let i = 0; i < 120000; i++) {
                            idx1 = memory[idx1];
                            idx2 = memory[idx2];
                            idx3 = memory[idx3];
                            idx4 = memory[idx4];
                        }
                        
                        // 2. Удар по пропускной шине памяти (Memory Bandwidth)
                        let offset = (ops * 2048) % (bwBuffer.length - 2048);
                        for(let i = 0; i < 2048; i++) {
                            bwBuffer[offset + i] = bwBuffer[(offset + i + 1024) % bwBuffer.length] * 1.0001 + idx1;
                        }

                        ops++;
                    }

                    window.benchmarkAccumulator += (idx1 + idx2 + idx3 + idx4 + bwBuffer[0]);

                    let elapsed = performance.now() - startTime;
                    updateGlobalProgress(1, elapsed);

                    if (elapsed < STAGE_DURATION) {
                        requestAnimationFrame(memBatch);
                    } else {
                        // Скорректированный скор для новой нагрузки
                        resolve((ops / (elapsed / 1000)) * 48000); 
                    }
                }
                requestAnimationFrame(memBatch);
            });
        }

        // --- ЭТАП 3: ФИЗИКА ---
        function runPhysicsTest() {
            return new Promise((resolve) => {
                canvasContainer.style.display = 'block';
                canvasContainer.innerHTML = `
                    <div id="fps-counter" style="color:#ff8c00;">Симуляция N-Body: 3075 частиц</div>
                    <canvas id="phys-canvas"></canvas>
                `;
                
                const canvas = document.getElementById('phys-canvas');
                const ctx = canvas.getContext('2d', { alpha: false });
                canvas.width = canvasContainer.clientWidth;
                canvas.height = 450;

                let ops = 0;
                let startTime = performance.now();
                
                const BODIES = 3075; 
                const x = new Float32Array(BODIES);
                const y = new Float32Array(BODIES);
                const vx = new Float32Array(BODIES);
                const vy = new Float32Array(BODIES);
                const mass = new Float32Array(BODIES);

                for(let i=0; i<BODIES; i++) {
                    x[i] = Math.random() * canvas.width; 
                    y[i] = Math.random() * canvas.height;
                    vx[i] = 0; vy[i] = 0; mass[i] = Math.random() * 10 + 1;
                }

                function physicsBatch() {
                    let batchStart = performance.now();
                    
                    while (performance.now() - batchStart < 14) {
                        let localEnergy = 0;
                        const G = 0.05;
                        
                        for(let i = 0; i < BODIES; i++) {
                            let fx = 0, fy = 0;
                            for(let j = 0; j < BODIES; j++) {
                                if(i === j) continue;
                                let dx = x[j] - x[i];
                                let dy = y[j] - y[i];
                                let distSq = dx*dx + dy*dy + 0.1;
                                
                                let dist = Math.sqrt(distSq); 
                                let angle = Math.atan2(dy, dx); 
                                let f = (G * mass[i] * mass[j]) / distSq;
                                
                                fx += f * Math.cos(angle);
                                fy += f * Math.sin(angle);
                            }
                            vx[i] += fx / mass[i];
                            vy[i] += fy / mass[i];
                        }

                        for(let i = 0; i < BODIES; i++) {
                            x[i] += vx[i];
                            y[i] += vy[i];
                            
                            if(x[i] < 0) x[i] += canvas.width;
                            if(x[i] > canvas.width) x[i] -= canvas.width;
                            if(y[i] < 0) y[i] += canvas.height;
                            if(y[i] > canvas.height) y[i] -= canvas.height;

                            localEnergy += vx[i] + vy[i];
                        }
                        
                        window.benchmarkAccumulator += localEnergy;
                        ops++;
                    }

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#00c6ff';
                    for(let i = 0; i < BODIES; i++) {
                        ctx.fillRect(x[i], y[i], 2, 2);
                    }

                    let elapsed = performance.now() - startTime;
                    updateGlobalProgress(2, elapsed);

                    if (elapsed < STAGE_DURATION) {
                        requestAnimationFrame(physicsBatch);
                    } else {
                        resolve((ops / (elapsed / 1000)) * 120000); 
                    }
                }
                requestAnimationFrame(physicsBatch);
            });
        }

        // --- ЭТАП 4: УМОЩНЕННЫЙ ТЕСТ GPU ---
        function runGPUTest() {
            return new Promise((resolve) => {
                canvasContainer.innerHTML = '<div id="fps-counter">FPS: 0</div>'; 
                const localFpsCounter = document.getElementById('fps-counter');

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x020202);
                scene.fog = new THREE.FogExp2(0x020202, 0.008);

                const camera = new THREE.PerspectiveCamera(60, canvasContainer.clientWidth / 450, 0.1, 1000);
                camera.position.z = 97;

                const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" }); 
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(canvasContainer.clientWidth, 450);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                canvasContainer.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x222222); 
                scene.add(ambientLight);
                
                const lights = [];
                const colors = [0xff0040, 0x0040ff, 0x80ff80];
                for(let i=0; i<3; i++) {
                    let pl = new THREE.PointLight(colors[i], 1.2, 200);
                    pl.castShadow = true;
                    pl.shadow.mapSize.width = 256;
                    pl.shadow.mapSize.height = 256;
                    pl.shadow.bias = -0.001;
                    scene.add(pl);
                    lights.push(pl);
                }

                const objectCount = 110; 
                const geometry = new THREE.TorusKnotGeometry(2, 0.6, 80, 20); 
                
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xaaaaaa, 
                    metalness: 0.7,
                    roughness: 0.2
                });
                
                const meshes = [];
                for (let i = 0; i < objectCount; i++) {
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(
                        (Math.random() - 0.5) * 180,
                        (Math.random() - 0.5) * 180,
                        (Math.random() - 0.5) * 180
                    );
                    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    meshes.push(mesh);
                }

                let framesInSec = 0;
                let totalFrames = 0;
                let startTime = performance.now();
                let lastFpsTime = startTime;

                function animate() {
                    let currentTime = performance.now();
                    let elapsed = currentTime - startTime;

                    if (currentTime - lastFpsTime >= 1000) {
                        localFpsCounter.innerText = `FPS: ${framesInSec} | Объектов: ${objectCount} | Освещение`;
                        framesInSec = 0;
                        lastFpsTime = currentTime;
                    }

                    let timeStr = currentTime * 0.001;

                    lights[0].position.set(Math.sin(timeStr)*50, Math.cos(timeStr)*50, 20);
                    lights[1].position.set(Math.cos(timeStr)*50, Math.sin(timeStr)*50, -20);
                    lights[2].position.set(-Math.sin(timeStr)*50, 0, Math.cos(timeStr)*50);

                    scene.rotation.y += 0.002;
                    scene.rotation.x += 0.001;
                    
                    for (let i = 0; i < objectCount; i++) { 
                        meshes[i].rotation.x += 0.02;
                        meshes[i].rotation.y += 0.02;
                    }

                    renderer.render(scene, camera);
                    framesInSec++;
                    totalFrames++;

                    updateGlobalProgress(3, elapsed);

                    if (elapsed < STAGE_DURATION) {
                        requestAnimationFrame(animate);
                    } else {
                        scene.clear();
                        renderer.dispose();
                        geometry.dispose();
                        material.dispose();
                        
                        let avgFps = totalFrames / (STAGE_DURATION / 1000);
                        let gpuScore = avgFps * 3500; 
                        
                        setTimeout(() => { canvasContainer.style.display = 'none'; }, 500);
                        resolve(gpuScore);
                    }
                }
                animate();
            });
        }
    </script>
</body>
</html>
